<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 268 52" role="img" aria-label="JobLens">
  <defs>
    <!-- Wordmark: cyan -> royal blue -> magenta -->
    <linearGradient id="jlWordmark" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#00D1FF"/>
      <stop offset="48%" stop-color="#0057FF"/>
      <stop offset="100%" stop-color="#A020F0"/>
    </linearGradient>
    <!-- Icon outer rim -->
    <linearGradient id="jlRimStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D1FF"/>
      <stop offset="50%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="jlLensGlass" cx="32%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="45%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <radialGradient id="jlLensPupil" cx="38%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="70%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="jlInnerRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4C1D95"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <!-- Top-left glass bloom (coating / front element shine) -->
    <radialGradient id="jlGlassBloom" cx="28%" cy="22%" r="72%">
      <stop offset="0%" stop-color="#f1f5f9" stop-opacity="0.45"/>
      <stop offset="35%" stop-color="#94a3b8" stop-opacity="0.12"/>
      <stop offset="70%" stop-color="#1e293b" stop-opacity="0"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <!-- Rim catch-light on glass edge -->
    <linearGradient id="jlRimLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="#bae6fd" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="jlLensClip">
      <circle cx="26" cy="26" r="14"/>
    </clipPath>
  </defs>

  <!-- Mark: dark circular badge so traces + lens read on white UI -->
  <g id="jl-icon">
    <circle cx="26" cy="26" r="25" fill="#030712"/>
    <circle cx="26" cy="26" r="23.5" fill="none" stroke="url(#jlRimStroke)" stroke-width="2.2" opacity="0.95"/>
    <circle cx="26" cy="26" r="18.5" fill="none" stroke="url(#jlInnerRing)" stroke-width="1.4" opacity="0.85"/>
    <circle cx="26" cy="26" r="14" fill="url(#jlLensGlass)"/>
    <!-- Coating shine over glass -->
    <circle cx="26" cy="26" r="14" fill="url(#jlGlassBloom)"/>
    <circle cx="26" cy="26" r="8.2" fill="url(#jlLensPupil)"/>
    <!-- Front-element edge highlight (camera lens ring) -->
    <circle cx="26" cy="26" r="13.35" fill="none" stroke="url(#jlRimLight)" stroke-width="0.65" opacity="0.9"/>
    <g clip-path="url(#jlLensClip)">
      <!-- Curved reflection band (DSLR front glass sweep) -->
      <path d="M 13.5 19.2 A 11.2 11.2 0 0 1 23.5 13.8" fill="none" stroke="#ffffff" stroke-width="1.15" stroke-linecap="round" opacity="0.42"/>
      <path d="M 14.2 20.5 A 9.5 9.5 0 0 1 21.8 16.2" fill="none" stroke="#e0f2fe" stroke-width="0.55" stroke-linecap="round" opacity="0.35"/>
      <!-- Lower iris / inner barrel glint -->
      <ellipse cx="22.2" cy="31.2" rx="3.2" ry="1.55" fill="#38bdf8" opacity="0.14" transform="rotate(-18 22.2 31.2)"/>
      <!-- Primary specular (main highlight) -->
      <ellipse cx="20.2" cy="17.5" rx="4.4" ry="2.95" fill="#ffffff" opacity="0.42" transform="rotate(-34 20.2 17.5)"/>
      <!-- Soft secondary bloom -->
      <ellipse cx="21.5" cy="18.8" rx="6.2" ry="4.6" fill="#f0f9ff" opacity="0.16" transform="rotate(-28 21.5 18.8)"/>
      <!-- Sharp micro hotspot -->
      <ellipse cx="18.6" cy="16.2" rx="1.6" ry="1.05" fill="#ffffff" opacity="0.72" transform="rotate(-28 18.6 16.2)"/>
      <!-- Pupil catch-light -->
      <ellipse cx="24.8" cy="24.6" rx="1.15" ry="0.85" fill="#ffffff" opacity="0.28"/>
    </g>
    <!-- Circuit traces (left) -->
    <g fill="none" stroke="#E2E8F0" stroke-width="1.35" stroke-linecap="round" opacity="0.92">
      <path d="M2 17.5h11.5"/>
      <path d="M2 23.5h14"/>
      <path d="M2 29.5h11.5"/>
    </g>
    <g fill="#E2E8F0">
      <circle cx="14.5" cy="17.5" r="1.35"/>
      <circle cx="17" cy="23.5" r="1.35"/>
      <circle cx="14.5" cy="29.5" r="1.35"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text
    x="58"
    y="36.5"
    font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
    font-size="28"
    font-weight="700"
    letter-spacing="-0.02em"
    fill="url(#jlWordmark)"
  >JobLens</text>
</svg>
